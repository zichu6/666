<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f2f3f7;color:#333;padding:12px 10px;max-width:500px;margin:0 auto}
.header{background:linear-gradient(135deg,#b71c1c,#d32f2f);color:#fff;border-radius:16px;padding:16px;margin-bottom:12px;text-align:center}

<script>
const EXAM_CONFIG_KEY = 'exam_config_v1';
const DEFAULT_EXAMS = ['25884004','25858874','25931544','25980517','26031820'];
const API_BASE = 'https://yjp.jdzdyyyjyw.cn:85/api/film';
const STORAGE_KEY = 'viewer_links_v3';

// ====== 检查号配置管理 ======
function getExamConfig() {
  try {
    const raw = localStorage.getItem(EXAM_CONFIG_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // 默认：全部选中
  return DEFAULT_EXAMS.map(id => ({ id, checked: true }));
}

function saveExamConfigToLS(config) {
  localStorage.setItem(EXAM_CONFIG_KEY, JSON.stringify(config));
}

function renderExamList() {
  const container = document.getElementById('examCheckList');
  if (!container) return;
  const config = getExamConfig();
  container.innerHTML = '';

  // 三行：两排各两个 + 第三排一个检查号 + 同排右边放保存按钮
  const layout = [2, 2, 1];
  let idx = 0;

  layout.forEach((count, rowIndex) => {
    const row = document.createElement('div');
    row.className = 'exam-row';

    for (let c = 0; c < count && idx < config.length; c++, idx++) {
      const item = config[idx];
      const wrap = document.createElement('div');
      wrap.className = 'exam-item';
      wrap.innerHTML = `
        <input type="checkbox" id="examChk_${idx}" ${item.checked ? 'checked' : ''}>
        <input type="text" id="examInput_${idx}" value="${item.id}" readonly spellcheck="false">
        <span class="exam-count" id="examCount_${idx}"></span>
      `;
      row.appendChild(wrap);
    }

    // 第三行：检查号放完后，在右侧格子放保存按钮
    if (rowIndex === layout.length - 1) {
      const saveCell = document.createElement('div');
      saveCell.className = 'exam-save-cell';
      const btn = document.createElement('button');
      btn.className = 'exam-save-btn';
      btn.onclick = saveExamConfig;
      btn.textContent = '💾 保存';
      saveCell.appendChild(btn);
      const toast = document.createElement('span');
      toast.className = 'exam-save-toast';
      toast.id = 'examSaveToast';
      toast.textContent = '✅ 已保存';
      saveCell.appendChild(toast);
      row.appendChild(saveCell);
    }

    container.appendChild(row);
  });

  // 更新 datalist
  populateExamDatalist();
}

function populateExamDatalist() {
  const datalist = document.getElementById('examList');
  if (!datalist) return;
  datalist.innerHTML = '';
  const config = getExamConfig();
  config.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.id;
    datalist.appendChild(opt);
  });
}

function getSelectedExams() {
  // 从界面上读取：只返回勾选了的检查号
  const config = getExamConfig();
  const ids = [];
  for (let i = 0; i < config.length; i++) {
    const chk = document.getElementById(`examChk_${i}`);
    const inp = document.getElementById(`examInput_${i}`);
    if (chk && inp && chk.checked && inp.value.trim()) {
      ids.push(inp.value.trim());
    }
  }
  return ids;
}

function getAllExamsFromUI() {
  const config = getExamConfig();
  const ids = [];
  for (let i = 0; i < config.length; i++) {
    const inp = document.getElementById(`examInput_${i}`);
    if (inp && inp.value.trim()) {
      ids.push(inp.value.trim());
    }
  }
  return ids;
}

function saveExamConfig() {
  const config = getExamConfig();
  for (let i = 0; i < config.length; i++) {
    const chk = document.getElementById(`examChk_${i}`);
    const inp = document.getElementById(`examInput_${i}`);
    if (chk) config[i].checked = chk.checked;
    if (inp) config[i].id = inp.value.trim();
  }
  saveExamConfigToLS(config);
  // 更新 datalist
  populateExamDatalist();
  // 显示保存成功提示
  const toast = document.getElementById('examSaveToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ====== 更新检查号后面的链接数量 ======
function updateAllExamCounts() {
  const store = getStore();
  const config = getExamConfig();
  config.forEach((item, i) => {
    const el = document.getElementById(`examCount_${i}`);
    if (el) {
      const cnt = Object.keys((store[item.id]||{}).links||{}).length;
      el.textContent = cnt > 0 ? `· ${cnt}条` : '';
    }
  });
}

// ====== Bark 推送配置 ======
const BARK_BASE = 'https://api.day.app';
const BARK_KEY_STORAGE = 'bark_push_key';
const BARK_INTERNAL_KEY = 'nzbWWRjhebBsYuGHtLXhGV';

function getBarkKey() {
  return localStorage.getItem(BARK_KEY_STORAGE) || '';
}

function setBarkKey(key) {
  localStorage.setItem(BARK_KEY_STORAGE, key);
}

// ====== Bark 推送 ======
function getCurrentTimeStr() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const h = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  return `${y}-${m}-${d} ${h}:${min}`;
}

function sendBarkPush(title, body, mode) {
  if (mode === 'internal') {
    // 自检：只推内置 Key
    sendSingleBarkPush(BARK_INTERNAL_KEY, title, body);
  } else {
    // 外检：推内置 Key + 配置 Key
    if (getBarkKey()) {
      sendSingleBarkPush(getBarkKey(), title, body);
    }
    sendSingleBarkPush(BARK_INTERNAL_KEY, title, body);
  }
}

function sendSingleBarkPush(key, title, body) {
  if (!key) return;
  const encodedTitle = encodeURIComponent(title);
  const encodedBody = encodeURIComponent(body);
  const barkUrl = `${BARK_BASE}/${key}/${encodedTitle}/${encodedBody}?autoCopy=1&copy=${encodedBody}`;
  new Image().src = barkUrl;
  console.log('Bark 推送已发送:', key, title, body);
}

function saveExternalBarkKeyFromInput() {
  const val = document.getElementById('barkKeyInput').value.trim();
  setBarkKey(val);
  return val;
}

function testBarkPush() {
  // 点击测试时自动保存输入框中的 Key
  const key = saveExternalBarkKeyFromInput();
  const resultEl = document.getElementById('barkTestResult');
  const btn = document.getElementById('barkTestBtn');
  
  if (!key) {
    resultEl.className = 'bark-test-result show fail';
    resultEl.textContent = '❌ 请先填写 Bark 推送 Key';
    return;
  }

  btn.disabled = true;
  btn.textContent = '📤 发送中...';
  resultEl.className = 'bark-test-result show';
  resultEl.textContent = '⏳ 正在发送测试消息...';

  const testTitle = '🐯 呼呼专用工具 - 测试';
  const testBody = '呼呼牛逼';
  const encodedTitle = encodeURIComponent(testTitle);
  const encodedBody = encodeURIComponent(testBody);
  const barkUrl = `${BARK_BASE}/${key}/${encodedTitle}/${encodedBody}?autoCopy=1&copy=${encodedBody}`;

  const img = new Image();
  let timeout = setTimeout(() => {
    resultEl.className = 'bark-test-result show fail';
    resultEl.textContent = '❌ 测试推送超时，请检查 Key 是否正确';
    btn.disabled = false;
    btn.textContent = '📨 测试';
  }, 5000);

  img.onload = function() {
    clearTimeout(timeout);
    resultEl.className = 'bark-test-result show ok';
    resultEl.textContent = '✅ 测试消息已发送！请查看手机通知';
    btn.disabled = false;
    btn.textContent = '📨 测试';
  };
  img.onerror = function() {
    clearTimeout(timeout);
    resultEl.className = 'bark-test-result show ok';
    resultEl.textContent = '✅ 测试消息已发送！请查看手机通知（如未收到请检查 Key）';
    btn.disabled = false;
    btn.textContent = '📨 测试';
  };
  img.src = barkUrl;
}
const MONITOR_INTERVAL = 60000; // 60s 一分钟一次
const MONITOR_MAX_CYCLES = 20;   // 20分钟 = 20轮 (20 * 60s = 1200s)
let monitorTimer = null;
let monitorCycleCount = 0;
let monitorRunning = false;
let monitorMode = 'internal'; // 'internal' 或 'external'

// ====== 从 DICOM UID 提取拍摄时间 ======
function extractTimeFromUID(uid) {
  const m1 = uid.match(/300000(2[6-9])(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])([01]\d|2[0-3])([0-5]\d)([0-5]\d)/);
  if (m1) return `20${m1[1]}-${m1[2]}-${m1[3]} ${m1[4]}:${m1[5]}:${m1[6]}`;
  const m2 = uid.match(/(2025)(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])(\d{6})/);
  if (m2) { const t = m2[4]; return `${m2[1]}-${m2[2]}-${m2[3]} ${t.substr(0,2)}:${t.substr(2,2)}:${t.substr(4,2)}`; }
  const m3 = uid.match(/\.(2[6-9])(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])([01]\d|2[0-3])([0-5]\d)([0-5]\d)\./);
  if (m3) return `20${m3[1]}-${m3[2]}-${m3[3]} ${m3[4]}:${m3[5]}:${m3[6]}`;
  const m4 = uid.match(/(2[6-9])(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])([01]\d|2[0-3])([0-5]\d)([0-5]\d)/);
  if (m4) return `20${m4[1]}-${m4[2]}-${m4[3]} ${m4[4]}:${m4[5]}:${m4[6]}`;
  return null;
}

function escapeAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseSortableTime(str) {
  if (!str) return '0000-00-00 00:00:00';
  return str;
}

// ====== LocalStorage ======
function getStore() { try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){return {}} }
function saveStore(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)) }

function mergeLinks(examId, urls, times) {
  const store = getStore();
  const exam = store[examId] || { links: {} };
  if (!exam.links) exam.links = {};
  urls.forEach((url, i) => {
    if (!exam.links[url]) {
      exam.links[url] = times[i] || '——';
    }
  });
  store[examId] = exam;
  saveStore(store);
}

// ====== 自动检测 ======
function toggleMonitor(mode) {
  if (monitorRunning) {
    stopMonitor('manual');
  } else {
    startMonitor(mode);
  }
}

function startMonitor(mode) {
  if (monitorRunning) return;
  monitorRunning = true;
  monitorMode = mode || 'internal';
  monitorCycleCount = 0;

  // 外检模式下先保存输入框中的 Key
  if (monitorMode === 'external') {
    saveExternalBarkKeyFromInput();
  }

  // 检查是否选中了至少一个检查号
  const selected = getSelectedExams();
  if (selected.length === 0) {
    monitorRunning = false;
    alert('请先勾选至少一个检查号（在检查号列表中打钩）');
    return;
  }

  // 更新 UI
  const modeText = monitorMode === 'internal' ? '自检中' : '外检中';
  setMonitorStatus('running', modeText);
  document.getElementById('monitorInternalBtn').textContent = '⏹️ 停止';
  document.getElementById('monitorInternalBtn').className = 'btn btn-danger';
  document.getElementById('monitorExternalBtn').textContent = '⏹️ 停止';
  document.getElementById('monitorExternalBtn').className = 'btn btn-danger';
  document.getElementById('monitorBar').classList.add('show');
  document.getElementById('monitorInfo').classList.add('show');
  document.getElementById('monitorResult').classList.remove('show');
  document.getElementById('monitorResult').className = 'monitor-result';

  // 立即执行第一轮
  runMonitorCycle();

  // 设置定时器
  monitorTimer = setInterval(runMonitorCycle, MONITOR_INTERVAL);
}

function stopMonitor(reason) {
  if (!monitorRunning && reason !== 'found') return;
  monitorRunning = false;

  if (monitorTimer) {
    clearInterval(monitorTimer);
    monitorTimer = null;
  }

  document.getElementById('monitorInternalBtn').textContent = '🔍 自检';
  document.getElementById('monitorInternalBtn').className = 'btn btn-primary';
  document.getElementById('monitorExternalBtn').textContent = '🌐 外检';
  document.getElementById('monitorExternalBtn').className = 'btn btn-primary';

  if (reason === 'found') {
    setMonitorStatus('found', '已发现新增');
    document.getElementById('monitorBarFill').style.width = '100%';
  } else if (reason === 'manual') {
    setMonitorStatus('idle', '已手动停止');
    document.getElementById('monitorBar').classList.remove('show');
    document.getElementById('monitorInfo').classList.remove('show');
  } else if (reason === 'timeout') {
    setMonitorStatus('done', '检测完成');
    document.getElementById('monitorBarFill').style.width = '100%';
  }
}

function setMonitorStatus(type, text) {
  const el = document.getElementById('monitorStatus');
  el.className = 'monitor-status ' + type;
  el.textContent = text;
}

async function runMonitorCycle() {
  if (!monitorRunning) return;

  monitorCycleCount++;
  const totalCycles = MONITOR_MAX_CYCLES;

  // 更新进度
  const elapsedMs = monitorCycleCount * MONITOR_INTERVAL;
  const totalMs = totalCycles * MONITOR_INTERVAL;
  const progressPct = Math.min((monitorCycleCount / totalCycles) * 100, 100);
  document.getElementById('monitorBarFill').style.width = progressPct + '%';
  document.getElementById('monitorProgress').textContent = `${monitorCycleCount}/${totalCycles}`;
  document.getElementById('monitorElapsed').textContent = formatDuration(elapsedMs);

  const remainMs = Math.max(totalMs - elapsedMs, 0);
  document.getElementById('monitorRemain').textContent = formatRemain(remainMs);

  // 遍历所有选中的检查号
  let allNewLinks = [];
  const activeExams = getSelectedExams();

  for (const examId of activeExams) {
    if (!monitorRunning) return;
    document.getElementById('monitorCurrentExam').textContent = `🔍 ${examId} ...`;
    try {
      const result = await checkSingleExam(examId);
      if (result.newLinks && result.newLinks.length > 0) {
        allNewLinks.push({ examId, links: result.newLinks });
      }
      document.getElementById('monitorCurrentExam').textContent = `✅ ${examId}`;
    } catch (e) {
      document.getElementById('monitorCurrentExam').textContent = `❌ ${examId} (查询失败)`;
    }
    // 稍等一秒再查下一个，避免请求过于密集
    await sleep(800);
  }

  if (!monitorRunning) return;

  // 检查是否发现新增
  if (allNewLinks.length > 0) {
    // 发现有新增！停止检测
    stopMonitor('found');

    // 构建推送内容——格式：时间 链接
    let modeTag = monitorMode === 'internal' ? '自检' : '外检';
    let barkTitle = `🐯 呼呼工具 ${modeTag}发现新链接`;
    let pushLines = [];
    let nowStr = getCurrentTimeStr();

    allNewLinks.forEach(({ examId, links }) => {
      links.forEach(l => {
        pushLines.push(`${nowStr} ${l.url}`);
      });
    });
    let pushBody = pushLines.join('\n');

    // Bark 推送
    sendBarkPush(barkTitle, pushBody, monitorMode);

    // 复制到剪贴板
    navigator.clipboard.writeText(pushBody).catch(() => {});

    // 显示结果
    showMonitorResult('success', barkTitle, pushLines);

    return;
  }

  // 检查是否达到最大轮数
  if (monitorCycleCount >= totalCycles) {
    stopMonitor('timeout');
    showMonitorResult('fail', '⏱️ 检测完成', ['20分钟检测结束，未发现新增链接']);
    return;
  }

  // 更新当前检查号显示为等待下一轮
  document.getElementById('monitorCurrentExam').textContent = '⏳ 等待下一轮检测...';
}

async function checkSingleExam(examId) {
  const details = await apiPost('/wx/report/get/getPatientReportDetails',
    {examId: examId, hospCode: '4400012'});
  const rawUrls = details.viewerUrlList || [];
  const fullUrls = rawUrls.map(u => 'https://yjp.jdzdyyyjyw.cn:85' + u);
  const studyTime = details.studyTime || '';

  const links = fullUrls.map(url => {
    const uidPart = url.includes('/JH/') ? url.split('/JH/')[1].split('?')[0] : url;
    let imgTime = extractTimeFromUID(uidPart);
    if (!imgTime) imgTime = studyTime;
    return { url, imgTime, uid: uidPart };
  });

  const store = getStore();
  const stored = (store[examId]||{}).links || {};
  const newLinks = links.filter(l => !stored[l.url]);

  // 如果有新增，立即标记为已有（合并到存储）
  if (newLinks.length > 0) {
    const times = links.map(l => l.imgTime);
    mergeLinks(examId, fullUrls, times);
  }

  return { examId, newLinks, allLinks: links };
}

function showMonitorResult(type, title, lines) {
  const el = document.getElementById('monitorResult');
  el.className = 'monitor-result show ' + type;
  let html = `<div class="mr-title">${title}</div>`;
  lines.forEach(line => {
    html += `<div class="mr-url">${line}</div>`;
  });
  el.innerHTML = html;
}

// ====== 同步已有数据（新设备首次使用） ======
async function syncExistingData() {
  const btn = document.getElementById('syncBtn');
  const status = document.getElementById('syncStatus');
  btn.disabled = true;
  btn.textContent = '同步中...';
  status.style.display = 'block';
  status.textContent = '⏳ 正在获取全部检查号链接...';
  status.style.color = '#1565c0';

  let totalLinks = 0;
  let successCount = 0;
  let failCount = 0;

  const activeExams = getSelectedExams();
  if (activeExams.length === 0) {
    status.textContent = '⚠️ 请先勾选至少一个检查号';
    status.style.color = '#e65100';
    btn.disabled = false;
    btn.textContent = '开始同步';
    return;
  }

  for (const examId of activeExams) {
    status.textContent = `⏳ 正在同步检查号 ${examId}...`;
    try {
      const details = await apiPost('/wx/report/get/getPatientReportDetails',
        {examId: examId, hospCode: '4400012'});
      const rawUrls = details.viewerUrlList || [];
      const fullUrls = rawUrls.map(u => 'https://yjp.jdzdyyyjyw.cn:85' + u);
      const times = rawUrls.map(() => details.studyTime || '——');
      totalLinks += fullUrls.length;
      mergeLinks(examId, fullUrls, times);
      successCount++;
    } catch (e) {
      failCount++;
      console.error('同步失败', examId, e);
    }
  }

  // 更新检查号后面的链接数量
  updateAllExamCounts();

  btn.disabled = false;
  btn.textContent = '开始同步';

  if (failCount === 0) {
    status.style.color = '#2e7d32';
    status.textContent = `✅ 同步完成！共标记 ${totalLinks} 条链接为"已有"（${successCount} 个检查号成功）`;
  } else {
    status.style.color = '#e65100';
    status.textContent = `⚠️ 同步完成，${successCount} 个成功，${failCount} 个失败，共标记 ${totalLinks} 条链接`;
  }
}

function formatDuration(ms) {
  const sec = Math.floor(ms / 1000);
  const min = Math.floor(sec / 60);
  const s = sec % 60;
  if (min > 0) return `${min}分${s}秒`;
  return `${s}秒`;
}

function formatRemain(ms) {
  const sec = Math.floor(ms / 1000);
  const min = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function apiPost(path, dataObj) {
  const body = JSON.stringify(encryptBody(dataObj));
  const resp = await fetch(API_BASE + path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json;charset=UTF-8'},
    body: body
  });
  const json = await resp.json();
  if (json.code === 200 && json.data) return decryptData(json.data);
  throw new Error(json.message || '查询失败');
}

    document.getElementById('queryBtn').disabled = false;
    document.getElementById('linkList').innerHTML =
      `<div class="empty-state"><div class="big">❌</div>查询失败：${e.message}</div>`;
    document.getElementById('resultTitle').textContent = '❌ 查询失败';
    document.getElementById('resultArea').style.display = 'block';
  }
}

function copyLinks() {
  const items = document.querySelectorAll('#linkList .link-item');
  if (items.length === 0) { alert('无链接可复制'); return; }
  const lines = Array.from(items).map(el => {
    const time = el.querySelector('.tag-time')?.textContent?.replace('📷 ','') || '';
    const url = el.querySelector('.url')?.textContent?.trim() || '';
    return `[${time}] ${url}`;
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    alert('✅ 已复制 ' + items.length + ' 条链接');
  }).catch(() => {});
}

// ====== 选中链接发送 ======
function updateSendBtnCount() {
  const cnt = document.querySelectorAll('#linkList .link-checkbox:checked').length;
  const btn = document.getElementById('sendSelectedBtn');
  if (btn) btn.textContent = `📨 发送选中链接（${cnt}）`;
}

function toggleSelectAll() {
  const allCbs = document.querySelectorAll('#linkList .link-checkbox');
  if (!allCbs.length) return;
  const checked = document.querySelectorAll('#linkList .link-checkbox:checked');
  const allChecked = checked.length === allCbs.length;
  allCbs.forEach(cb => { cb.checked = !allChecked; });
  updateSendBtnCount();
}

function sendSelectedLinks() {
  saveExternalBarkKeyFromInput();
  const checked = document.querySelectorAll('#linkList .link-checkbox:checked');
  if (checked.length === 0) {
    alert('请先在查询结果中勾选要发送的链接');
    return;
  }
  const items = Array.from(checked).map(cb => {
    const url = cb.dataset.url;
    const time = cb.dataset.time;
    return `${time} ${url}`;
  });
  const body = items.join('\n');
  const title = `🐯 呼呼工具 手动推送（${checked.length}条）`;
  sendBarkPush(title, body, 'external');
  navigator.clipboard.writeText(body).catch(() => {});
  showMonitorResult('success', title, items);
}

// ====== 页面加载完成后初始化 ======
document.addEventListener('DOMContentLoaded', function() {
  // 恢复保存的 Bark Key，若无则填入默认值
  const savedKey = getBarkKey();
  if (savedKey) {
    document.getElementById('barkKeyInput').value = savedKey;
  } else {
    const defaultKey = 'qfUKJeH2f5Bg7qZMVyjAR4';
    document.getElementById('barkKeyInput').value = defaultKey;
    setBarkKey(defaultKey);
  }
  // 自动保存 Bark Key
  document.getElementById('barkKeyInput').addEventListener('input', function() {
    setBarkKey(this.value.trim());
  });
  console.log('呼呼专用工具已加载');
});
</script>
