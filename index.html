<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>云影像链接查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f2f3f7;color:#333;padding:16px 14px;max-width:500px;margin:0 auto}
.header{background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;border-radius:16px;padding:20px;margin-bottom:16px;text-align:center}
.header h1{font-size:20px;margin-bottom:4px}
.header p{font-size:13px;opacity:.85}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.input-group{display:flex;gap:8px;align-items:stretch}
.input-group input{flex:1;padding:14px;border:2px solid #ddd;border-radius:12px;font-size:16px;outline:none;transition:border-color .2s}
.input-group input:focus{border-color:#1565c0}
.btn{padding:14px 20px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;color:#fff;transition:all .2s;white-space:nowrap}
.btn-primary{background:#1565c0}
.btn-primary:active{background:#0d47a1}
.btn:disabled{background:#ccc;cursor:not-allowed}
.quick-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.quick-btn{padding:8px 14px;border:1.5px solid #d0d0d0;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;transition:all .2s;color:#333}
.quick-btn:active{background:#e3f2fd;border-color:#1565c0}
.quick-btn.active{background:#1565c0;border-color:#1565c0;color:#fff}
.loading{text-align:center;padding:20px;display:none}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:#1565c0;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:#888;margin-top:8px}
.result-header{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.count-badge{background:#e3f2fd;color:#1565c0;padding:3px 10px;border-radius:10px;font-size:12px}
.link-item{border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;margin-bottom:6px;word-break:break-all}
.link-item .url{font-size:11px;color:#1565c0;line-height:1.5;margin-top:3px}
.link-item .url a{color:#1565c0;text-decoration:none}
.link-item .meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.link-item .tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500}
.tag-new{background:#ffebee;color:#d32f2f}
.tag-old{background:#e8eaf6;color:#3949ab}
.tag-time{font-size:11px;color:#666;font-weight:500}
.empty-state{text-align:center;padding:30px;color:#999;font-size:15px}
.empty-state .big{font-size:40px;margin-bottom:10px}
.result-info{font-size:12px;color:#999;margin:6px 0 10px}
.copyright{text-align:center;font-size:11px;color:#bbb;margin-top:20px;padding:10px}
</style>
</head>
<body>

<div class="header">
  <h1>🖼️ 云影像链接查询</h1>
  <p>输入检查号，查询影像链接</p>
</div>

<div class="card">
  <div style="font-size:14px;font-weight:600;margin-bottom:8px">📋 检查号</div>
  <div class="quick-list" id="quickList"></div>
  <div class="input-group">
    <input type="text" id="examInput" placeholder="点击上方按钮或在此输入..." list="examList">
    <datalist id="examList"></datalist>
    <button class="btn btn-primary" id="queryBtn" onclick="startQuery()">🔍 查询</button>
  </div>
  <div id="prevInfo" style="font-size:12px;color:#999;margin-top:6px"></div>
</div>

<div id="loadingArea" class="loading">
  <div class="spinner"></div>
  <div class="loading-text">正在查询...</div>
</div>

<div id="resultArea" style="display:none">
  <div class="card">
    <div class="result-header">
      <span id="resultTitle">📄 查询结果</span>
      <span class="count-badge" id="resultBadge">0 条</span>
    </div>
    <div class="result-info" id="resultInfo"></div>
    <div id="linkList"></div>
    <button class="btn btn-primary" style="margin-top:10px;font-size:14px;padding:10px" onclick="copyLinks()">📋 复制所有链接</button>
  </div>
</div>

<div class="copyright" style="display:none">景德镇第一人民医院 · 影像生态数字服务</div>

<script>
const EXAM_IDS = ['25884004','25858874','25931544','25980517','26031820'];
const API_BASE = 'https://yjp.jdzdyyyjyw.cn:85/api/film';
const STORAGE_KEY = 'viewer_links_v3';

// ====== SM4 ======
const SM4 = (()=>{
  const SB=[0xd6,0x90,0xe9,0xfe,0xcc,0xe1,0x3d,0xb7,0x16,0xb6,0x14,0xc2,0x28,0xfb,0x2c,0x05,0x2b,0x67,0x9a,0x76,0x2a,0xbe,0x04,0xc3,0xaa,0x44,0x13,0x26,0x49,0x86,0x06,0x99,0x9c,0x42,0x50,0xf4,0x91,0xef,0x98,0x7a,0x33,0x54,0x0b,0x43,0xed,0xcf,0xac,0x62,0xe4,0xb3,0x1c,0xa9,0xc9,0x08,0xe8,0x95,0x80,0xdf,0x94,0xfa,0x75,0x8f,0x3f,0xa6,0x47,0x07,0xa7,0xfc,0xf3,0x73,0x17,0xba,0x83,0x59,0x3c,0x19,0xe6,0x85,0x4f,0xa8,0x68,0x6b,0x81,0xb2,0x71,0x64,0xda,0x8b,0xf8,0xeb,0x0f,0x4b,0x70,0x56,0x9d,0x35,0x1e,0x24,0x0e,0x5e,0x63,0x58,0xd1,0xa2,0x25,0x22,0x7c,0x3b,0x01,0x21,0x78,0x87,0xd4,0x00,0x46,0x57,0x9f,0xd3,0x27,0x52,0x4c,0x36,0x02,0xe7,0xa0,0xc4,0xc8,0x9e,0xea,0xbf,0x8a,0xd2,0x40,0xc7,0x38,0xb5,0xa3,0xf7,0xf2,0xce,0xf9,0x61,0x15,0xa1,0xe0,0xae,0x5d,0xa4,0x9b,0x34,0x1a,0x55,0xad,0x93,0x32,0x30,0xf5,0x8c,0xb1,0xe3,0x1d,0xf6,0xe2,0x2e,0x82,0x66,0xca,0x60,0xc0,0x29,0x23,0xab,0x0d,0x53,0x4e,0x6f,0xd5,0xdb,0x37,0x45,0xde,0xfd,0x8e,0x2f,0x03,0xff,0x6a,0x72,0x6d,0x6c,0x5b,0x51,0x8d,0x1b,0xaf,0x92,0xbb,0xdd,0xbc,0x7f,0x11,0xd9,0x5c,0x41,0x1f,0x10,0x5a,0xd8,0x0a,0xc1,0x31,0x88,0xa5,0xcd,0x7b,0xbd,0x2d,0x74,0xd0,0x12,0xb8,0xe5,0xb4,0xb0,0x89,0x69,0x97,0x4a,0x0c,0x96,0x77,0x7e,0x65,0xb9,0xf1,0x09,0xc5,0x6e,0xc6,0x84,0x18,0xf0,0x7d,0xec,0x3a,0xdc,0x4d,0x20,0x79,0xee,0x5f,0x3e,0xd7,0xcb,0x39,0x48];
  const FK=[0xa3b1bac6,0x56aa3350,0x677d9197,0xb27022dc],CK=[0x00070e15,0x1c232a31,0x383f464d,0x545b6269,0x70777e85,0x8c939aa1,0xa8afb6bd,0xc4cbd2d9,0xe0e7eef5,0xfc030a11,0x181f262d,0x343b4249,0x50575e65,0x6c737a81,0x888f969d,0xa4abb2b9,0xc0c7ced5,0xdce3eaf1,0xf8ff060d,0x141b2229,0x30373e45,0x4c535a61,0x686f767d,0x848b9299,0xa0a7aeb5,0xbcc3cad1,0xd8dfe6ed,0xf4fb0209,0x10171e25,0x2c333a41,0x484f565d,0x646b7279];
  function rl(x,n){return((x<<n)|(x>>>(32-n)))>>>0}
  function tau(A){return(SB[(A>>>24)&0xff]<<24)|(SB[(A>>>16)&0xff]<<16)|(SB[(A>>>8)&0xff]<<8)|SB[A&0xff]}
  function L1(A){return A^rl(A,2)^rl(A,10)^rl(A,18)^rl(A,24)}
  function L2(A){return A^rl(A,13)^rl(A,23)}
  return{
    expandKey(kb){const MK=[];for(let i=0;i<4;i++)MK[i]=((kb[4*i]<<24)|(kb[4*i+1]<<16)|(kb[4*i+2]<<8)|kb[4*i+3])>>>0;const K=[];for(let i=0;i<4;i++)K[i]=(MK[i]^FK[i])>>>0;for(let i=0;i<32;i++){let t=K[i+1]^K[i+2]^K[i+3]^CK[i];K[i+4]=(K[i]^L2(tau(t)))>>>0}return K.slice(4)},
    cryptBlock(b,rk,enc){const X=[];for(let i=0;i<4;i++)X[i]=((b[4*i]<<24)|(b[4*i+1]<<16)|(b[4*i+2]<<8)|b[4*i+3])>>>0;const r=enc?rk:[...rk].reverse();for(let i=0;i<32;i++){let t=X[i+1]^X[i+2]^X[i+3]^r[i];X[i+4]=(X[i]^L1(tau(t)))>>>0}const o=new Uint8Array(16);for(let i=0;i<4;i++){const v=X[35-i];o[4*i]=(v>>>24)&0xff;o[4*i+1]=(v>>>16)&0xff;o[4*i+2]=(v>>>8)&0xff;o[4*i+3]=v&0xff}return o},
    pad(d){const p=16-(d.length%16);const r=new Uint8Array(d.length+p);r.set(d);for(let i=d.length;i<r.length;i++)r[i]=p;return r},
    unpad(d){const p=d[d.length-1];if(p<1||p>16)throw Error('bad padding');for(let i=d.length-p;i<d.length;i++)if(d[i]!==p)throw Error('bad padding');return d.slice(0,d.length-p)},
    enc(pt,kb){const rk=this.expandKey(kb);const d=new TextEncoder().encode(pt);const pd=this.pad(d);const r=new Uint8Array(pd.length);for(let i=0;i<pd.length;i+=16)r.set(this.cryptBlock(pd.slice(i,i+16),rk,1),i);return r},
    dec(ct,kb){if(ct.length%16!==0)throw Error('invalid len');const rk=this.expandKey(kb);const r=new Uint8Array(ct.length);for(let i=0;i<ct.length;i+=16)r.set(this.cryptBlock(ct.slice(i,i+16),rk,0),i);return new TextDecoder().decode(this.unpad(r))}
  };
})();
const KEY=(()=>{const k='70616373323032353038313231383330',b=new Uint8Array(16);for(let i=0;i<16;i++)b[i]=parseInt(k.substr(i*2,2),16);return b})();
function encryptBody(p){const ct=SM4.enc(JSON.stringify(p),KEY);return btoa(String.fromCharCode(...new Uint8Array([...ct])))}
function decryptData(b64){const b=atob(b64),r=new Uint8Array(b.length);for(let i=0;i<b.length;i++)r[i]=b.charCodeAt(i);return JSON.parse(SM4.dec(r,KEY))}

// ====== 从 DICOM UID 提取拍摄时间 ======
function extractTimeFromUID(uid) {
  // 格式1: 300000YYMMDDHHMMSS (PACS 系统)
  const m1 = uid.match(/300000(2[6-9])(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])([01]\d|2[0-3])([0-5]\d)([0-5]\d)/);
  if (m1) return `20${m1[1]}-${m1[2]}-${m1[3]} ${m1[4]}:${m1[5]}:${m1[6]}`;
  
  // 格式2: 2025MMDDHHMMSS
  const m2 = uid.match(/(2025)(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])(\d{6})/);
  if (m2) {
    const t = m2[4];
    return `${m2[1]}-${m2[2]}-${m2[3]} ${t.substr(0,2)}:${t.substr(2,2)}:${t.substr(4,2)}`;
  }
  
  // 格式3: YYMMDDHHMMSS 在UID组件中
  const m3 = uid.match(/\.(2[6-9])(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])([01]\d|2[0-3])([0-5]\d)([0-5]\d)\./);
  if (m3) return `20${m3[1]}-${m3[2]}-${m3[3]} ${m3[4]}:${m3[5]}:${m3[6]}`;
  
  // 格式4: 直接匹配 YYMMDDHHMMSS
  const m4 = uid.match(/(2[6-9])(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])([01]\d|2[0-3])([0-5]\d)([0-5]\d)/);
  if (m4) return `20${m4[1]}-${m4[2]}-${m4[3]} ${m4[4]}:${m4[5]}:${m4[6]}`;
  
  return null;
}

function parseSortableTime(str) {
  if (!str) return '0000-00-00 00:00:00';
  // Convert to sortable format
  return str;
}

// ====== LocalStorage ======
function getStore() { try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){return {}} }
function saveStore(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)) }

function mergeLinks(examId, urls, times) {
  const store = getStore();
  const exam = store[examId] || { links: {} };
  if (!exam.links) exam.links = {};
  urls.forEach((url, i) => {
    if (!exam.links[url]) {
      exam.links[url] = times[i] || '——';
    }
  });
  store[examId] = exam;
  saveStore(store);
}

// ====== UI ======
// 初始化快捷按钮
EXAM_IDS.forEach(eid => {
  const btn = document.createElement('button');
  btn.className = 'quick-btn';
  btn.dataset.val = eid;
  btn.textContent = eid;
  btn.onclick = function() {
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('examInput').value = this.dataset.val;
    showPrevInfo(this.dataset.val);
  };
  document.getElementById('quickList').appendChild(btn);
  
  const opt = document.createElement('option');
  opt.value = eid;
  document.getElementById('examList').appendChild(opt);
  
  // Show stored count
  const store = getStore();
  const cnt = Object.keys((store[eid]||{}).links||{}).length;
  if (cnt > 0) btn.textContent = `${eid} · ${cnt}条`;
});

document.getElementById('examInput').addEventListener('input', function() {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.quick-btn').forEach(b => {
    if (b.dataset.val === this.value) b.classList.add('active');
  });
  showPrevInfo(this.value);
});

function showPrevInfo(examId) {
  if (!examId) { document.getElementById('prevInfo').textContent = ''; return; }
  const store = getStore();
  const stored = (store[examId]||{}).links || {};
  const cnt = Object.keys(stored).length;
  document.getElementById('prevInfo').textContent = cnt > 0 ? `上次查到 ${cnt} 条链接` : '';
}

async function apiPost(path, dataObj) {
  const body = JSON.stringify(encryptBody(dataObj));
  const resp = await fetch(API_BASE + path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json;charset=UTF-8'},
    body: body
  });
  const json = await resp.json();
  if (json.code === 200 && json.data) return decryptData(json.data);
  throw new Error(json.message || '查询失败');
}

async function startQuery() {
  const examId = document.getElementById('examInput').value.trim();
  if (!examId) { alert('请输入检查号'); return; }
  
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('queryBtn').disabled = true;
  
  try {
    const details = await apiPost('/wx/report/get/getPatientReportDetails', 
      {examId: examId, hospCode: '4400012'});
    
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('queryBtn').disabled = false;
    
    const rawUrls = details.viewerUrlList || [];
    const fullUrls = rawUrls.map(u => 'https://yjp.jdzdyyyjyw.cn:85' + u);
    const studyTime = details.studyTime || '';
    
    document.getElementById('resultTitle').textContent = `📄 检查号 ${examId}`;
    
    if (fullUrls.length === 0) {
      document.getElementById('linkList').innerHTML = 
        '<div class="empty-state"><div class="big">🖼️</div>无可用云影像链接</div>';
      document.getElementById('resultBadge').textContent = '0 条';
      document.getElementById('resultInfo').textContent = '';
      document.getElementById('resultArea').style.display = 'block';
      return;
    }
    
    // 每条链接提取拍摄时间
    const links = fullUrls.map(url => {
      const uidPart = url.includes('/JH/') ? url.split('/JH/')[1].split('?')[0] : url;
      let imgTime = extractTimeFromUID(uidPart);
      if (!imgTime) imgTime = studyTime; // 无法提取则用检查时间
      return { url, imgTime, uid: uidPart };
    });
    
    // 按拍摄时间排序（最新的在最前）
    links.sort((a, b) => b.imgTime.localeCompare(a.imgTime));
    
    // 检测新增（用存储的首次时间）
    const store = getStore();
    const stored = (store[examId]||{}).links || {};
    const newCount = fullUrls.filter(u => !stored[u]).length;
    
    // 更新存储
    const times = links.map(l => l.imgTime);
    mergeLinks(examId, fullUrls, times);
    
    document.getElementById('resultBadge').textContent = `${fullUrls.length} 条`;
    document.getElementById('resultInfo').textContent = 
      `🕐 按拍摄时间倒序 · ${newCount > 0 ? `🆕 新增 ${newCount} 条` : '无新增'}`;
    
    let html = '';
    links.forEach((item, i) => {
      const isNew = !stored[item.url];
      const tagClass = isNew ? 'tag-new' : 'tag-old';
      const tagText = isNew ? '🆕 新增' : '已有';
      html += `<div class="link-item">
        <div class="meta">
          <span class="tag ${tagClass}">${tagText}</span>
          <span class="tag-time">📷 ${item.imgTime}</span>
        </div>
        <div class="url"><a href="${item.url}" target="_blank">${item.url}</a></div>
      </div>`;
    });
    
    document.getElementById('linkList').innerHTML = html;
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
    
    // 更新按钮文字
    showPrevInfo(examId);
    document.querySelectorAll('.quick-btn').forEach(b => {
      if (b.dataset.val === examId) {
        const store2 = getStore();
        const cnt2 = Object.keys((store2[examId]||{}).links||{}).length;
        b.textContent = `${examId} · ${cnt2}条`;
      }
    });
    
  } catch(e) {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('queryBtn').disabled = false;
    document.getElementById('linkList').innerHTML = 
      `<div class="empty-state"><div class="big">❌</div>查询失败：${e.message}</div>`;
    document.getElementById('resultTitle').textContent = '❌ 查询失败';
    document.getElementById('resultArea').style.display = 'block';
  }
}

function copyLinks() {
  const items = document.querySelectorAll('#linkList .link-item');
  if (items.length === 0) { alert('无链接可复制'); return; }
  const lines = Array.from(items).map(el => {
    const time = el.querySelector('.tag-time')?.textContent?.replace('📷 ','') || '';
    const url = el.querySelector('.url')?.textContent?.trim() || '';
    return `[${time}] ${url}`;
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    alert('✅ 已复制 ' + items.length + ' 条链接');
  }).catch(() => {});
}
</script>
</body>
</html>
