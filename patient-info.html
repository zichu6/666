<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>患者信息查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f0faf0;color:#333;padding:16px 14px;max-width:500px;margin:0 auto}
.header{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:16px;padding:24px 20px;margin-bottom:16px;text-align:center}
.header h1{font-size:22px;margin-bottom:4px}
.header p{font-size:13px;opacity:.85}
.card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(46,125,50,.08);border:1px solid #e8f5e9}
.input-group{display:flex;gap:8px;align-items:stretch}
.input-group input{flex:1;padding:12px;border:2px solid #c8e6c9;border-radius:12px;font-size:15px;outline:none;transition:border-color .2s;background:#fafffa}
.input-group input:focus{border-color:#2e7d32;background:#fff}
select{padding:14px;border:2px solid #c8e6c9;border-radius:12px;font-size:14px;outline:none;background:#fafffa;color:#333;width:100%;margin-bottom:10px;transition:border-color .2s}
select:focus{border-color:#2e7d32}
.btn{padding:14px 20px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;color:#fff;transition:all .2s;white-space:nowrap}
.btn-green{background:#2e7d32}
.btn-green:active{background:#1b5e20}
.btn:disabled{background:#ccc;cursor:not-allowed}
.loading{text-align:center;padding:20px;display:none}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:#2e7d32;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:#888;margin-top:8px}
.result-section{margin-top:4px}
.result-label{font-size:12px;color:#888;margin-bottom:2px}
.result-value{font-size:16px;font-weight:500;color:#333;padding:8px 12px;background:#f5fbf5;border-radius:10px;margin-bottom:10px;word-break:break-all}
.result-row{display:flex;gap:10px;margin-bottom:10px}
.result-row .col{flex:1}
.result-row .result-value{margin-bottom:0}
#resultContent{-webkit-user-select:text;user-select:text}
#resultContent .info-card{-webkit-user-select:all;user-select:all}
.info-card{border-left:3px solid #2e7d32;background:#f5fbf5;border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:4px}
.info-card .label{font-size:11px;color:#888}
.info-card .val{font-size:14px;color:#1b5e20;font-weight:500;margin-top:1px}
.empty-state{text-align:center;padding:30px;color:#999;font-size:15px}
.empty-state .big{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <h1>患者信息查询</h1>
  <p>输入检查号或手机号查询</p>
</div>

<div class="card">
  <div class="input-group">
    <input type="text" id="queryInput" placeholder="输入检查号或手机号...">
    <button class="btn btn-green" id="queryBtn" onclick="startQuery()">查询</button>
  </div>
  <div style="font-size:12px;color:#aaa;margin-top:8px">支持：检查号、手机号、就诊号</div>
</div>

<div id="loadingArea" class="loading">
  <div class="spinner"></div>
  <div class="loading-text">正在查询...</div>
</div>

<div id="resultArea" style="display:none">
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:6px;color:#2e7d32" id="resultTitle">查询结果</div>
    <div id="resultContent"></div>
  </div>
</div>

<script>
const API_BASE = 'https://yjp.jdzdyyyjyw.cn:85/api/film';
const KEY = (()=>{const k='70616373323032353038313231383330',b=new Uint8Array(16);for(let i=0;i<16;i++)b[i]=parseInt(k.substr(i*2,2),16);return b})();

const SM4 = (()=>{
  const SB=[0xd6,0x90,0xe9,0xfe,0xcc,0xe1,0x3d,0xb7,0x16,0xb6,0x14,0xc2,0x28,0xfb,0x2c,0x05,0x2b,0x67,0x9a,0x76,0x2a,0xbe,0x04,0xc3,0xaa,0x44,0x13,0x26,0x49,0x86,0x06,0x99,0x9c,0x42,0x50,0xf4,0x91,0xef,0x98,0x7a,0x33,0x54,0x0b,0x43,0xed,0xcf,0xac,0x62,0xe4,0xb3,0x1c,0xa9,0xc9,0x08,0xe8,0x95,0x80,0xdf,0x94,0xfa,0x75,0x8f,0x3f,0xa6,0x47,0x07,0xa7,0xfc,0xf3,0x73,0x17,0xba,0x83,0x59,0x3c,0x19,0xe6,0x85,0x4f,0xa8,0x68,0x6b,0x81,0xb2,0x71,0x64,0xda,0x8b,0xf8,0xeb,0x0f,0x4b,0x70,0x56,0x9d,0x35,0x1e,0x24,0x0e,0x5e,0x63,0x58,0xd1,0xa2,0x25,0x22,0x7c,0x3b,0x01,0x21,0x78,0x87,0xd4,0x00,0x46,0x57,0x9f,0xd3,0x27,0x52,0x4c,0x36,0x02,0xe7,0xa0,0xc4,0xc8,0x9e,0xea,0xbf,0x8a,0xd2,0x40,0xc7,0x38,0xb5,0xa3,0xf7,0xf2,0xce,0xf9,0x61,0x15,0xa1,0xe0,0xae,0x5d,0xa4,0x9b,0x34,0x1a,0x55,0xad,0x93,0x32,0x30,0xf5,0x8c,0xb1,0xe3,0x1d,0xf6,0xe2,0x2e,0x82,0x66,0xca,0x60,0xc0,0x29,0x23,0xab,0x0d,0x53,0x4e,0x6f,0xd5,0xdb,0x37,0x45,0xde,0xfd,0x8e,0x2f,0x03,0xff,0x6a,0x72,0x6d,0x6c,0x5b,0x51,0x8d,0x1b,0xaf,0x92,0xbb,0xdd,0xbc,0x7f,0x11,0xd9,0x5c,0x41,0x1f,0x10,0x5a,0xd8,0x0a,0xc1,0x31,0x88,0xa5,0xcd,0x7b,0xbd,0x2d,0x74,0xd0,0x12,0xb8,0xe5,0xb4,0xb0,0x89,0x69,0x97,0x4a,0x0c,0x96,0x77,0x7e,0x65,0xb9,0xf1,0x09,0xc5,0x6e,0xc6,0x84,0x18,0xf0,0x7d,0xec,0x3a,0xdc,0x4d,0x20,0x79,0xee,0x5f,0x3e,0xd7,0xcb,0x39,0x48];
  const FK=[0xa3b1bac6,0x56aa3350,0x677d9197,0xb27022dc],CK=[0x00070e15,0x1c232a31,0x383f464d,0x545b6269,0x70777e85,0x8c939aa1,0xa8afb6bd,0xc4cbd2d9,0xe0e7eef5,0xfc030a11,0x181f262d,0x343b4249,0x50575e65,0x6c737a81,0x888f969d,0xa4abb2b9,0xc0c7ced5,0xdce3eaf1,0xf8ff060d,0x141b2229,0x30373e45,0x4c535a61,0x686f767d,0x848b9299,0xa0a7aeb5,0xbcc3cad1,0xd8dfe6ed,0xf4fb0209,0x10171e25,0x2c333a41,0x484f565d,0x646b7279];
  function rl(x,n){return((x<<n)|(x>>>(32-n)))>>>0}
  function tau(A){return(SB[(A>>>24)&0xff]<<24)|(SB[(A>>>16)&0xff]<<16)|(SB[(A>>>8)&0xff]<<8)|SB[A&0xff]}
  function L1(A){return A^rl(A,2)^rl(A,10)^rl(A,18)^rl(A,24)}
  function L2(A){return A^rl(A,13)^rl(A,23)}
  return{
    expandKey(kb){const MK=[];for(let i=0;i<4;i++)MK[i]=((kb[4*i]<<24)|(kb[4*i+1]<<16)|(kb[4*i+2]<<8)|kb[4*i+3])>>>0;const K=[];for(let i=0;i<4;i++)K[i]=(MK[i]^FK[i])>>>0;for(let i=0;i<32;i++){let t=K[i+1]^K[i+2]^K[i+3]^CK[i];K[i+4]=(K[i]^L2(tau(t)))>>>0}return K.slice(4)},
    cryptBlock(b,rk,enc){const X=[];for(let i=0;i<4;i++)X[i]=((b[4*i]<<24)|(b[4*i+1]<<16)|(b[4*i+2]<<8)|b[4*i+3])>>>0;const r=enc?rk:[...rk].reverse();for(let i=0;i<32;i++){let t=X[i+1]^X[i+2]^X[i+3]^r[i];X[i+4]=(X[i]^L1(tau(t)))>>>0}const o=new Uint8Array(16);for(let i=0;i<4;i++){const v=X[35-i];o[4*i]=(v>>>24)&0xff;o[4*i+1]=(v>>>16)&0xff;o[4*i+2]=(v>>>8)&0xff;o[4*i+3]=v&0xff}return o},
    pad(d){const p=16-(d.length%16);const r=new Uint8Array(d.length+p);r.set(d);for(let i=d.length;i<r.length;i++)r[i]=p;return r},
    unpad(d){const p=d[d.length-1];if(p<1||p>16)throw Error('bad padding');for(let i=d.length-p;i<d.length;i++)if(d[i]!==p)throw Error('bad padding');return d.slice(0,d.length-p)},
    enc(pt){const rk=this.expandKey(KEY);const d=new TextEncoder().encode(pt);const pd=this.pad(d);const r=new Uint8Array(pd.length);for(let i=0;i<pd.length;i+=16)r.set(this.cryptBlock(pd.slice(i,i+16),rk,1),i);return r},
    dec(ct){const rk=this.expandKey(KEY);const r=new Uint8Array(ct.length);for(let i=0;i<ct.length;i+=16)r.set(this.cryptBlock(ct.slice(i,i+16),rk,0),i);return new TextDecoder().decode(this.unpad(r))}
  };
})();

function encryptBody(p){const ct=SM4.enc(JSON.stringify(p));return btoa(String.fromCharCode(...new Uint8Array([...ct])))}
function decryptData(b64){const b=atob(b64),r=new Uint8Array(b.length);for(let i=0;i<b.length;i++)r[i]=b.charCodeAt(i);return JSON.parse(SM4.dec(r))}

async function apiPost(path, dataObj) {
  const resp = await fetch(API_BASE + path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json;charset=UTF-8'},
    body: JSON.stringify(encryptBody(dataObj))
  });
  const json = await resp.json();
  if (json.code === 200 && json.data) return decryptData(json.data);
  throw new Error((json.message || '查询失败') + (json.msg||''));
}

async function startQuery() {
  const query = document.getElementById('queryInput').value.trim();
  const hospCode = '4400012';
  if (!query) { alert('请输入检查号或手机号'); return; }
  
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('queryBtn').disabled = true;
  
  try {
    // Step 1: Get patient info via examInfoValidateH5
    document.querySelector('.loading-text').textContent = '正在查询患者信息...';
    const info = await apiPost('/wx/report/get/examInfoValidateH5', {examId: query, hospCode: hospCode});
    
    // Step 2: Get full report details for age, gender, check item etc.
    document.querySelector('.loading-text').textContent = '正在获取详细信息...';
    let details = null;
    try {
      details = await apiPost('/wx/report/get/getPatientReportDetails', {examId: query, hospCode: hospCode});
    } catch(e) { /* report details optional */ }
    
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('queryBtn').disabled = false;
    
    document.getElementById('resultTitle').textContent = `${details ? details.patName || '' : ''}患者信息`;
    
    const statusMap = ['','已登记','已检查','已诊断','已审核','已打印'];
    const r = details || {};
    
    let html = '';
    
    // 姓名
    html += `<div class="info-card">
      <div class="label">姓名</div>
      <div class="val">${(r.patName || info.patName || '未知')}</div>
    </div>`;
    
    // 一行两个：性别 + 年龄
    html += `<div style="display:flex;gap:6px;margin-bottom:4px">`;
    if (r.patGender) html += `<div class="info-card" style="flex:1;border-left-color:#66bb6a">
      <div class="label">性别</div>
      <div class="val">${r.patGender}</div>
    </div>`;
    if (r.patAge) html += `<div class="info-card" style="flex:1;border-left-color:#66bb6a">
      <div class="label">年龄</div>
      <div class="val">${r.patAge}${r.patAgeUnit || ''}</div>
    </div>`;
    html += `</div>`;
    
    // 手机号
    if (info.phone || r.patContact) html += `<div class="info-card">
      <div class="label">手机号</div>
      <div class="val">${(info.phone || r.patContact || '').replace('.','')}</div>
    </div>`;
    
    // 身份证
    if (info.patCertNo) html += `<div class="info-card">
      <div class="label">身份证号</div>
      <div class="val">${info.patCertNo}</div>
    </div>`;
    
    // 患者编号
    if (info.risPatId) html += `<div class="info-card">
      <div class="label">患者编号</div>
      <div class="val">${info.risPatId}</div>
    </div>`;
    
    // 检查项目 + 部位
    if (r.checkItem || r.modality) html += `<div class="info-card">
      <div class="label">检查项目</div>
      <div class="val">${r.checkItem || ''}${r.modality ? ' (' + r.modality + ')' : ''}</div>
    </div>`;
    
    // 检查编号 + 报告ID
    if (r.checkNum && r.checkNum !== query) html += `<div class="info-card">
      <div class="label">检查编号</div>
      <div class="val">${r.checkNum}</div>
    </div>`;
    
    // 检查日期
    if (r.studyTime) html += `<div class="info-card">
      <div class="label">检查日期</div>
      <div class="val">${r.studyTime}</div>
    </div>`;
    
    // 报告日期
    if (r.reportEndTime) html += `<div class="info-card">
      <div class="label">报告日期</div>
      <div class="val">${r.reportEndTime}</div>
    </div>`;
    
    // 医院
    if (r.hosName) html += `<div class="info-card">
      <div class="label">医院</div>
      <div class="val">${r.hosName}</div>
    </div>`;
    
    // 报告状态
    if (r.status) html += `<div class="info-card">
      <div class="label">报告状态</div>
      <div class="val">${statusMap[r.status] || r.status}</div>
    </div>`;
    
    // 影像所见
    if (r.approveWys) html += `<div class="info-card">
      <div class="label">影像所见</div>
      <div class="val" style="font-size:14px;font-weight:400;white-space:pre-wrap">${r.approveWys.trim()}</div>
    </div>`;
    
    // 诊断意见
    if (r.approveWyg) html += `<div class="info-card">
      <div class="label">诊断意见</div>
      <div class="val" style="font-size:14px;font-weight:400;white-space:pre-wrap">${r.approveWyg.trim()}</div>
    </div>`;
    
    // 报告医生 + 审核医生
    if (r.reportDoctorName || r.approveDoctorName) {
      html += `<div style="display:flex;gap:6px;margin-bottom:4px">`;
      if (r.reportDoctorName) html += `<div class="info-card" style="flex:1;border-left-color:#66bb6a">
        <div class="label">报告医生</div>
        <div class="val">${r.reportDoctorName}</div>
      </div>`;
      if (r.approveDoctorName) html += `<div class="info-card" style="flex:1;border-left-color:#66bb6a">
        <div class="label">审核医生</div>
        <div class="val">${r.approveDoctorName}</div>
      </div>`;
      html += `</div>`;
    }
    
    // 影像链接
    if (r.viewerUrlList && r.viewerUrlList.length > 0) {
      html += `<div style="margin-top:2px"><div class="info-card">
        <div class="label">影像链接</div>
        <div style="margin-top:2px">`;
      r.viewerUrlList.forEach((url, i) => {
        const fullUrl = 'https://yjp.jdzdyyyjyw.cn:85' + url;
        html += `<div style="font-size:11px;margin-bottom:4px"><a href="${fullUrl}" target="_blank" style="color:#1565c0;text-decoration:none">${fullUrl}</a></div>`;
      });
      html += `</div></div>`;
    }
    
    // 完整 JSON（折叠）
    html += `<details style="margin-top:6px">
      <summary style="font-size:11px;color:#aaa;cursor:pointer">查看完整JSON数据</summary>
      <pre style="font-size:10px;background:#f5fbf5;padding:6px;border-radius:4px;margin-top:4px;overflow:auto;max-height:150px;color:#888">${JSON.stringify({info, details}, null, 2)}</pre>
    </details>`;
    
    html += `<div style="margin-top:6px;font-size:11px;color:#bbb">查询条件：${query}</div>`;
    
    html += `<div style="text-align:right;margin-top:6px"><button onclick="copyResult()" style="font-size:11px;padding:4px 12px;border:1px solid #c8e6c9;border-radius:6px;background:#fafffa;color:#2e7d32;cursor:pointer">复制结果</button></div>`;
    
    document.getElementById('resultContent').innerHTML = html;
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
    
  } catch(e) {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('queryBtn').disabled = false;
    document.getElementById('resultTitle').textContent = '查询失败';
    document.getElementById('resultContent').innerHTML = `<div class="empty-state"><div class="big"></div>${e.message}</div>`;
    document.getElementById('resultArea').style.display = 'block';
  }
}

function copyResult() {
  const text = document.getElementById('resultContent').textContent.replace('复制结果', '').trim();
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制结果', 1500);
  }).catch(() => alert('复制失败，请长按手动选择复制'));
}

// Enter key to search
document.getElementById('queryInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startQuery();
});
</script>
</body>
</html>
