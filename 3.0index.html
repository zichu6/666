<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>患者查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f0faf0;color:#333;padding:16px 14px;max-width:500px;margin:0 auto}
.header{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:16px;padding:20px;margin-bottom:12px;text-align:center}
.header h1{font-size:20px;margin-bottom:2px}
.header p{font-size:12px;opacity:.8}
.card{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(46,125,50,.08);border:1px solid #e8f5e9}
.input-group{display:flex;gap:8px}
.input-group input{flex:1;padding:12px;border:2px solid #c8e6c9;border-radius:10px;font-size:15px;outline:none;background:#fafffa}
.input-group input:focus{border-color:#2e7d32}
.btn{padding:12px 20px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;color:#fff;background:#2e7d32}
.btn:disabled{background:#ccc}
.loading{text-align:center;padding:20px;display:none}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid #e0e0e0;border-top-color:#2e7d32;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#888;margin-top:6px}
.info-card{border-left:3px solid #2e7d32;background:#f5fbf5;border-radius:0 8px 8px 0;padding:7px 10px;margin-bottom:3px}
.info-card .label{font-size:11px;color:#888}
.info-card .val{font-size:14px;color:#1b5e20;font-weight:500;margin-top:1px}
.report-item{border:1px solid #e8f5e9;border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:all .15s;position:relative}
.report-item:active{background:#f0faf0}
.report-item .ri-title{font-size:14px;font-weight:500;color:#1b5e20}
.report-item .ri-meta{font-size:11px;color:#888;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.report-item .ri-status{font-size:10px;padding:1px 6px;border-radius:6px}
.st1{background:#fff3e0;color:#e65100}
.st2{background:#e3f2fd;color:#1565c0}
.st3{background:#e8f5e9;color:#2e7d32}
.st4{background:#f3e5f5;color:#7b1fa2}
.st5{background:#e8eaf6;color:#283593}
.empty-state{text-align:center;padding:30px;color:#999;font-size:14px}
.report-detail{display:none}
</style>
</head>
<body>

<div class="header">
  <h1>患者查询</h1>
  <p>输入检查号或手机号</p>
</div>

<div class="card">
  <div class="input-group">
    <input type="text" id="queryInput" placeholder="检查号 / 手机号...">
    <button class="btn" id="queryBtn" onclick="startQuery()">查询</button>
  </div>
  <div style="font-size:11px;color:#aaa;margin-top:6px">手机号会显示该患者所有检查</div>
</div>

<div id="loadingArea" class="loading">
  <div class="spinner"></div>
  <div class="loading-text">查询中...</div>
</div>

<div id="resultArea" style="display:none">
  <div class="card" id="patientInfoCard" style="display:none"></div>
  <div class="card">
    <div id="resultTitle" style="font-size:13px;font-weight:600;margin-bottom:8px;color:#2e7d32"></div>
    <div id="reportList"></div>
  </div>
  <div class="card" id="detailCard" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span id="detailTitle" style="font-size:13px;font-weight:600;color:#2e7d32"></span>
      <button onclick="backToList()" style="font-size:11px;border:none;background:#e8f5e9;padding:4px 10px;border-radius:6px;color:#2e7d32;cursor:pointer">返回列表</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const API_BASE = 'https://yjp.jdzdyyyjyw.cn:85/api/film';
const HOSP_CODE = '4400012';
const KEY = (()=>{const k='70616373323032353038313231383330',b=new Uint8Array(16);for(let i=0;i<16;i++)b[i]=parseInt(k.substr(i*2,2),16);return b})();
const SMAP = ['','已登记','已检查','已诊断','已审核','已打印'];

const SM4 = (()=>{
  const SB=[0xd6,0x90,0xe9,0xfe,0xcc,0xe1,0x3d,0xb7,0x16,0xb6,0x14,0xc2,0x28,0xfb,0x2c,0x05,0x2b,0x67,0x9a,0x76,0x2a,0xbe,0x04,0xc3,0xaa,0x44,0x13,0x26,0x49,0x86,0x06,0x99,0x9c,0x42,0x50,0xf4,0x91,0xef,0x98,0x7a,0x33,0x54,0x0b,0x43,0xed,0xcf,0xac,0x62,0xe4,0xb3,0x1c,0xa9,0xc9,0x08,0xe8,0x95,0x80,0xdf,0x94,0xfa,0x75,0x8f,0x3f,0xa6,0x47,0x07,0xa7,0xfc,0xf3,0x73,0x17,0xba,0x83,0x59,0x3c,0x19,0xe6,0x85,0x4f,0xa8,0x68,0x6b,0x81,0xb2,0x71,0x64,0xda,0x8b,0xf8,0xeb,0x0f,0x4b,0x70,0x56,0x9d,0x35,0x1e,0x24,0x0e,0x5e,0x63,0x58,0xd1,0xa2,0x25,0x22,0x7c,0x3b,0x01,0x21,0x78,0x87,0xd4,0x00,0x46,0x57,0x9f,0xd3,0x27,0x52,0x4c,0x36,0x02,0xe7,0xa0,0xc4,0xc8,0x9e,0xea,0xbf,0x8a,0xd2,0x40,0xc7,0x38,0xb5,0xa3,0xf7,0xf2,0xce,0xf9,0x61,0x15,0xa1,0xe0,0xae,0x5d,0xa4,0x9b,0x34,0x1a,0x55,0xad,0x93,0x32,0x30,0xf5,0x8c,0xb1,0xe3,0x1d,0xf6,0xe2,0x2e,0x82,0x66,0xca,0x60,0xc0,0x29,0x23,0xab,0x0d,0x53,0x4e,0x6f,0xd5,0xdb,0x37,0x45,0xde,0xfd,0x8e,0x2f,0x03,0xff,0x6a,0x72,0x6d,0x6c,0x5b,0x51,0x8d,0x1b,0xaf,0x92,0xbb,0xdd,0xbc,0x7f,0x11,0xd9,0x5c,0x41,0x1f,0x10,0x5a,0xd8,0x0a,0xc1,0x31,0x88,0xa5,0xcd,0x7b,0xbd,0x2d,0x74,0xd0,0x12,0xb8,0xe5,0xb4,0xb0,0x89,0x69,0x97,0x4a,0x0c,0x96,0x77,0x7e,0x65,0xb9,0xf1,0x09,0xc5,0x6e,0xc6,0x84,0x18,0xf0,0x7d,0xec,0x3a,0xdc,0x4d,0x20,0x79,0xee,0x5f,0x3e,0xd7,0xcb,0x39,0x48];
  const FK=[0xa3b1bac6,0x56aa3350,0x677d9197,0xb27022dc],CK=[0x00070e15,0x1c232a31,0x383f464d,0x545b6269,0x70777e85,0x8c939aa1,0xa8afb6bd,0xc4cbd2d9,0xe0e7eef5,0xfc030a11,0x181f262d,0x343b4249,0x50575e65,0x6c737a81,0x888f969d,0xa4abb2b9,0xc0c7ced5,0xdce3eaf1,0xf8ff060d,0x141b2229,0x30373e45,0x4c535a61,0x686f767d,0x848b9299,0xa0a7aeb5,0xbcc3cad1,0xd8dfe6ed,0xf4fb0209,0x10171e25,0x2c333a41,0x484f565d,0x646b7279];
  function rl(x,n){return((x<<n)|(x>>>(32-n)))>>>0}
  function tau(A){return(SB[(A>>>24)&0xff]<<24)|(SB[(A>>>16)&0xff]<<16)|(SB[(A>>>8)&0xff]<<8)|SB[A&0xff]}
  function L1(A){return A^rl(A,2)^rl(A,10)^rl(A,18)^rl(A,24)}
  function L2(A){return A^rl(A,13)^rl(A,23)}
  return{
    expandKey(kb){const MK=[];const K=[];for(let i=0;i<4;i++)MK[i]=((kb[4*i]<<24)|(kb[4*i+1]<<16)|(kb[4*i+2]<<8)|kb[4*i+3])>>>0,K[i]=(MK[i]^FK[i])>>>0;for(let i=0;i<32;i++){let t=K[i+1]^K[i+2]^K[i+3]^CK[i];K[i+4]=(K[i]^L2(tau(t)))>>>0}return K.slice(4)},
    cryptBlock(b,rk,enc){const X=[];for(let i=0;i<4;i++)X[i]=((b[4*i]<<24)|(b[4*i+1]<<16)|(b[4*i+2]<<8)|b[4*i+3])>>>0;const r=enc?rk:[...rk].reverse();for(let i=0;i<32;i++){let t=X[i+1]^X[i+2]^X[i+3]^r[i];X[i+4]=(X[i]^L1(tau(t)))>>>0}const o=new Uint8Array(16);for(let i=0;i<4;i++){const v=X[35-i];o[4*i]=(v>>>24)&0xff;o[4*i+1]=(v>>>16)&0xff;o[4*i+2]=(v>>>8)&0xff;o[4*i+3]=v&0xff}return o},
    pad(d){const p=16-(d.length%16);const r=new Uint8Array(d.length+p);r.set(d);for(let i=d.length;i<r.length;i++)r[i]=p;return r},
    unpad(d){const p=d[d.length-1];if(p<1||p>16)throw Error('bad padding');for(let i=d.length-p;i<d.length;i++)if(d[i]!==p)throw Error('bad padding');return d.slice(0,d.length-p)},
    enc(pt){const rk=this.expandKey(KEY);const d=new TextEncoder().encode(pt);const pd=this.pad(d);const r=new Uint8Array(pd.length);for(let i=0;i<pd.length;i+=16)r.set(this.cryptBlock(pd.slice(i,i+16),rk,1),i);return r},
    dec(ct){const rk=this.expandKey(KEY);const r=new Uint8Array(ct.length);for(let i=0;i<ct.length;i+=16)r.set(this.cryptBlock(ct.slice(i,i+16),rk,0),i);return new TextDecoder().decode(this.unpad(r))}
  };
})();

function enc(p){const ct=SM4.enc(JSON.stringify(p));return btoa(String.fromCharCode(...new Uint8Array([...ct])))}
function dec(b64){const b=atob(b64),r=new Uint8Array(b.length);for(let i=0;i<b.length;i++)r[i]=b.charCodeAt(i);return JSON.parse(SM4.dec(r))}

async function apiPost(path, data) {
  const resp = await fetch(API_BASE + path, {
    method:'POST', headers:{'Content-Type':'application/json;charset=UTF-8'},
    body: JSON.stringify(enc(data))
  });
  const j = await resp.json();
  if (j.code === 200 && j.data) return dec(j.data);
  throw new Error(j.message || '查询失败');
}

let reportListData = [];

function ic(label, val) {
  return `<div class="info-card"><div class="label">${label}</div><div class="val">${val}</div></div>`;
}

async function startQuery() {
  const q = document.getElementById('queryInput').value.trim();
  if (!q) { alert('请输入'); return; }
  
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('detailCard').style.display = 'none';
  document.getElementById('queryBtn').disabled = true;
  
  try {
    // 1. 获取患者基础信息
    const info = await apiPost('/wx/report/get/examInfoValidateH5', {examId: q, hospCode: HOSP_CODE});
    
    // 2. 获取检查列表
    const list = await apiPost('/wx/report/get/getPatientReportListH5', {examId: q, hospCode: HOSP_CODE});
    reportListData = list || [];
    
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('queryBtn').disabled = false;
    
    // 患者信息卡片
    let pi = ic('姓名', info.patName || '');
    if (info.phone) pi += ic('电话', info.phone.replace('.',''));
    if (info.patCertNo) pi += ic('身份证', info.patCertNo);
    document.getElementById('patientInfoCard').innerHTML = pi;
    document.getElementById('patientInfoCard').style.display = 'block';
    
    // 报告列表
    const isMulti = reportListData.length > 1;
    document.getElementById('resultTitle').textContent = isMulti ? `检查记录（${reportListData.length} 项）` : '检查记录';
    
    if (reportListData.length === 0) {
      document.getElementById('reportList').innerHTML = '<div class="empty-state">无检查记录</div>';
    } else {
      let html = '';
      reportListData.forEach((r, i) => {
        const st = parseInt(r.status) || 1;
        html += `<div class="report-item" onclick="showDetail(${i})">
          <div class="ri-title">${r.checkNum || ''} · ${r.examItemName || ''}</div>
          <div class="ri-meta">
            <span>${r.modality || ''}</span>
            <span>${r.regDate || ''}</span>
            <span class="ri-status st${st}">${SMAP[st] || ''}</span>
          </div>
        </div>`;
      });
      document.getElementById('reportList').innerHTML = html;
    }
    
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
    
  } catch(e) {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('queryBtn').disabled = false;
    document.getElementById('reportList').innerHTML = `<div class="empty-state">${e.message}</div>`;
    document.getElementById('resultTitle').textContent = '查询失败';
    document.getElementById('patientInfoCard').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
  }
}

async function showDetail(idx) {
  const r = reportListData[idx];
  if (!r) return;
  
  document.getElementById('detailCard').style.display = 'block';
  document.getElementById('detailTitle').textContent = `${r.checkNum || ''} 详情`;
  
  // 先显示基本信息
  const checkNum = r.checkNum || '';
  let html = ic('检查项目', r.examItemName || '');
  html += `<div style="display:flex;gap:6px;margin-bottom:3px">`;
  html += ic('性别', r.patGender || '');
  html += ic('年龄', (r.patAge||'')+(r.patAgeUnit||''));
  html += `</div>`;
  html += ic('检查日期', r.regDate || '');
  if (r.reportEndTime) html += ic('报告日期', r.reportEndTime);
  html += ic('状态', SMAP[parseInt(r.status)] || '');
  if (r.reportDoctorName) html += ic('报告医生', r.reportDoctorName);
  if (r.approveDoctorName) html += ic('审核医生', r.approveDoctorName);
  
  // 尝试获取详细报告（影像所见、诊断意见）
  try {
    const d = await apiPost('/wx/report/get/getPatientReportDetails', {examId: checkNum, hospCode: HOSP_CODE});
    if (d.approveWys) html += ic('影像所见', `<span style="font-size:13px;font-weight:400;white-space:pre-wrap">${d.approveWys.trim()}</span>`);
    if (d.approveWyg) html += ic('诊断意见', `<span style="font-size:13px;font-weight:400;white-space:pre-wrap">${d.approveWyg.trim()}</span>`);
    
    // 影像链接
    if (d.viewerUrlList && d.viewerUrlList.length > 0) {
      let lh = '<div class="info-card"><div class="label">影像链接</div>';
      d.viewerUrlList.forEach(u => {
        const fu = 'https://yjp.jdzdyyyjyw.cn:85' + u;
        lh += `<div style="font-size:11px;margin-top:2px"><a href="${fu}" target="_blank" style="color:#1565c0;text-decoration:none">${fu}</a></div>`;
      });
      lh += '</div>';
      html += lh;
    }
  } catch(e) {}
  
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailCard').scrollIntoView({behavior:'smooth'});
}

function backToList() {
  document.getElementById('detailCard').style.display = 'none';
  document.getElementById('reportList').scrollIntoView({behavior:'smooth'});
}

// Enter 键查询
document.getElementById('queryInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startQuery();
});
</script>
</body>
</html>
